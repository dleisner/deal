  .stats { display: flex; border-bottom: 1px solid #333; }
  .stats .cell { flex: 1; padding: 8px 0; text-align: center; border-right: 1px solid #333; }
  .stats .cell:last-child { border-right: none; }
  .stats .val { font-size: 15px; font-weight: bold; color: #00e040; line-height: 1; }
  .stats .label { font-size: 9px; color: #bbb; letter-spacing: 1px; margin-top: 3px; }
  .show-buttons {
    padding: 6px 8px; background: #282828;
    display: flex; flex-wrap: wrap; gap: 5px;
    border-bottom: 1px solid #333;
  }
  .show-btn {
    font-size: 11px; padding: 6px 0; cursor: pointer; border-radius: 10px;
    background: transparent; color: #ccc;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    letter-spacing: 0.3px; width: calc(33.33% - 4px);
    border: 1px solid #333;
  }
  .show-btn .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .setlist-panel {
    padding: 8px 10px; background: #222;
    border-bottom: 1px solid #333; overflow-wrap: break-word;
  }
  .setlist-header { font-size: 11px; letter-spacing: 1px; margin-bottom: 4px; text-transform: uppercase; }
  .setlist-body { font-size: 11px; color: #ddd; line-height: 1.6; }
  .set-label { font-weight: bold; margin-right: 4px; }
  .search-row { padding: 6px 10px; border-bottom: 1px solid #333; }
  .search-row input {
    width: 100%; padding: 5px 8px;
    font-size: 11px; border: 1px solid #333; border-radius: 0;
    background: #111; color: #00e040; outline: none;
  }
  .sort-row { padding: 5px 10px; display: flex; gap: 4px; border-bottom: 1px solid #333; align-items: center; }
  .sort-btn {
    font-size: 8px; padding: 2px 5px; cursor: pointer; border: none; border-radius: 0;
    background: transparent; color: #5a5a4e;
  }
  .sort-btn.active { background: #00a830; color: #1d1d1d; }
  .grid-header { padding: 0 10px; display: flex; align-items: flex-end; }
  .grid-header-spacer { width: 22px; }
  .grid-header-flex { flex: 1; }
  .grid-header-days-label { width: 28px; text-align: right; font-size: 6px; color: #999; padding-right: 8px; padding-bottom: 2px; align-self: flex-end; }
  .grid-header-shows { padding: 4px 0 2px; }
  .grid-header-row { display: flex; }
  .grid-header-cell { width: 15px; text-align: center; font-size: 8px; letter-spacing: 0.3px; line-height: 1; }
  .song-list { padding: 0 10px; }
  .song-row { display: flex; align-items: center; padding: 3px 0; }
  .song-count {
    width: 22px; text-align: center; font-size: 11px; font-weight: bold; flex-shrink: 0;
  }
  .song-name-cell { flex: 1; display: flex; align-items: center; gap: 5px; overflow: hidden; padding-left: 4px; }
  .song-name { font-size: 11px; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; }
  .song-name.canonical { color: #888; font-style: italic; }
  .canonical-star { color: #e2a845; margin-left: 3px; }
  .days-cell { width: 28px; text-align: right; font-size: 7px; color: #bbb; flex-shrink: 0; padding-right: 8px; }
  .dots-cell { display: flex; flex-shrink: 0; }
  .dot-slot {
    width: 15px; height: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .dot-slot .play-dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-slot .miss-x { font-size: 7px; color: #2a2a2a; font-weight: bold; line-height: 1; }
  .group-divider { height: 1px; background: #333; margin: 2px 0; }

const SONGS = SONGS_DATA.map(s => Object.assign({}, s, { abbr: ABBRS[s.name] || s.name }));

const TOTAL_SETS = 23;
const TOTAL_SONGS = 134;   // From DEALBASE; excludes canonical-not-yet-played
const CW = 15;

const SEGUE_CHAINS = [
  ["China Cat Sunflower","I Know You Rider"],
  ["Scarlet Begonias","Fire On The Mountain"],
  ["Help On The Way","Slipknot!","Franklin's Tower"],
  ["Shakedown Street","The Wheel"],
  ["Throwing Stones","The Other One"],
  ["Throwing Stones","Goin' Down The Road Feeling Bad"],

];

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ===== UTILITY =====
function daysBetween(dateStr) {
  // dateStr: "YYYY-MM-DD". Returns whole days between today (local) and that date.
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const parts = dateStr.split("-").map(Number);
  const d = new Date(parts[0], parts[1] - 1, parts[2]);
  d.setHours(0, 0, 0, 0);
  return Math.round((today - d) / 86400000);
}

function daysSinceLastPlay(song) {
  if (!song.dates.length) return null;
  return daysBetween(song.dates[song.dates.length - 1]);
}

function freqSort(a, b) {
  if (b.dates.length !== a.dates.length) return b.dates.length - a.dates.length;
  return a.abbr.localeCompare(b.abbr);
}

function applySegueGrouping(sorted) {
  const result = sorted.slice();
  const moved = new Set();
  for (const chain of SEGUE_CHAINS) {
    const leaderIdx = result.findIndex(s => s.name === chain[0]);
    if (leaderIdx === -1) continue;
    const leaderFreq = result[leaderIdx].dates.length;
    let insertAt = leaderIdx + 1;
    for (let j = 1; j < chain.length; j++) {
      const follower = chain[j];
      if (moved.has(follower)) continue;
      const fIdx = result.findIndex(s => s.name === follower);
      if (fIdx === -1) continue;
      const followerFreq = result[fIdx].dates.length;
      if (leaderFreq === followerFreq) {
        if (fIdx > insertAt) {
          const [item] = result.splice(fIdx, 1);
          result.splice(insertAt, 0, item);
          moved.add(follower);
          insertAt++;
        } else if (fIdx === insertAt) {
          moved.add(follower);
          insertAt++;
        }
      }
    }
  }
  return result;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// ===== STATE =====
const state = {
  search: "",
  sort: "freq",                  // "freq" | "alpha"
  selectedShow: SHOWS[0].date,
};

function setState(updates) {
  Object.assign(state, updates);
  render();
}

// ===== RENDER =====
function renderHeader() {
  return `
    <div class="header-bar">
      <span class="brand"><strong>DEALAMP</strong> v1.0</span>
      <span class="credit">© DR BONES</span>
    </div>`;
}

function renderStats() {
  const played = SONGS.filter(s => s.dates.length > 0 && !s.canonical).length;
  const totalPlays = SONGS.reduce((a, s) => a + s.dates.length, 0);
  const sps = (totalPlays / TOTAL_SETS).toFixed(1);
  const cells = [
    { l: "SHOWS",     v: SHOWS.length },
    { l: "SETS",      v: TOTAL_SETS },
    { l: "SONGS",     v: played },
    { l: "PLAYS",     v: totalPlays },
    { l: "SONGS/SET", v: sps },
  ];
  return `<div class="stats">${
    cells.map(c => `<div class="cell"><div class="val">${c.v}</div><div class="label">${c.l}</div></div>`).join("")
  }</div>`;
}

function renderShowButtons() {
  return `<div class="show-buttons">${
    SHOWS.map(s => {
      const active = state.selectedShow === s.date;
      const style = `border:1px solid ${active ? s.color : "#333"};background:${active ? s.color + "22" : "transparent"};color:${active ? "#fff" : "#ccc"};`;
      return `<button class="show-btn" data-date="${s.date}" style="${style}">
        <span class="dot" style="background:${s.color}"></span>
        <span>${s.short} ${escapeHtml(s.abbr)}</span>
      </button>`;
    }).join("")
  }</div>`;
}

function renderSetSongs(arr) {
  return arr.map((s, i) => {
    const tail = s.s ? "&nbsp;&gt;&nbsp;" : (i < arr.length - 1 ? ", " : "");
    const style = s.n === "?" ? ' style="color:#555;font-style:italic"' : "";
    return `<span${style}>${escapeHtml(s.n)}${tail}</span>`;
  }).join("");
}

function renderSetlist() {
  const sl = SETLISTS[state.selectedShow];
  if (!sl) return "";
  const showObj = SHOWS.find(s => s.date === state.selectedShow);
  const color = showObj.color;
  let body;
  if (sl.setBreak === null) {
    body = `<div><span class="set-label" style="color:${color}">I:</span>${renderSetSongs(sl.songs)}</div>`;
  } else {
    const set1 = sl.songs.slice(0, sl.setBreak);
    const set2 = sl.songs.slice(sl.setBreak);
    body = `
      <div><span class="set-label" style="color:${color}">I:</span>${renderSetSongs(set1)}</div>
      <div style="margin-top:4px"><span class="set-label" style="color:${color}">II:</span>${renderSetSongs(set2)}</div>`;
  }
  return `<div class="setlist-panel">
    <div class="setlist-header" style="color:${color}">${escapeHtml(showObj.venue)}, ${showObj.short}</div>
    <div class="setlist-body">${body}</div>
  </div>`;
}

function renderSearch() {
  return `<div class="search-row">
    <input id="search-input" type="text" placeholder="search..." value="${escapeHtml(state.search)}">
  </div>`;
}

function renderSortRow() {
  const btn = (key, label) =>
    `<button class="sort-btn ${state.sort === key ? "active" : ""}" data-sort="${key}">${label}</button>`;
  return `<div class="sort-row">${btn("freq","FREQ")}${btn("alpha","A-Z")}</div>`;
}

function renderGridHeader(gridShows) {
  const showFilter = state.selectedShow;
  // Month labels (only show when month changes)
  const monthLabels = gridShows.map((s, i) => {
    const d = new Date(s.date + "T00:00:00");
    const m = MONTHS[d.getMonth()];
    if (i === 0) return m;
    const prev = new Date(gridShows[i-1].date + "T00:00:00");
    return MONTHS[prev.getMonth()] !== m ? m : "";
  });
  const days = gridShows.map(s => new Date(s.date + "T00:00:00").getDate());
  const monthRow = gridShows.map((s, i) => {
    const hl = s.date === showFilter;
    const color = hl ? s.color : "#00e040";
    const fw = hl ? "bold" : "normal";
    return `<div class="grid-header-cell" style="color:${color};font-weight:${fw}">${monthLabels[i]}</div>`;
  }).join("");
  const dayRow = gridShows.map((s, i) => {
    const hl = s.date === showFilter;
    const color = hl ? s.color : "#ccc";
    return `<div class="grid-header-cell" style="color:${color};margin-top:2px">${days[i]}</div>`;
  }).join("");
  return `<div class="grid-header">
    <div class="grid-header-spacer"></div>
    <div class="grid-header-flex"></div>
    <div class="grid-header-days-label">DAYS</div>
    <div class="grid-header-shows" style="width:${gridShows.length * CW}px">
      <div class="grid-header-row">${monthRow}</div>
      <div class="grid-header-row" style="margin-top:2px">${dayRow}</div>
    </div>
  </div>`;
}

function renderSongRow(song, count, showCount, gridShows) {
  const isCanonical = song.canonical === true;
  const maxC = 8;
  const rawT = (maxC - Math.min(count, maxC)) / maxC;
  const t = 0.375 + 0.625 * rawT;
  const r = Math.round(200 * (1 - t));
  const g = Math.round(200 * t);
  const rowBg = `rgba(${r}, ${g}, 30, 0.09)`;
  const numColor = `rgb(${Math.min(r + 55, 255)}, ${Math.min(g + 55, 255)}, 50)`;
  const days = daysSinceLastPlay(song);
  const daysDisplay = days == null ? "—" : days;

  const dots = gridShows.map(show => {
    const on = song.dates.includes(show.date);
    const hl = show.date === state.selectedShow;
    const bg = hl ? show.color + "18" : "transparent";
    let inner;
    if (on) {
      inner = `<div class="play-dot" style="background:${show.color}"></div>`;
    } else if (hl) {
      inner = "";   // blank in highlighted column
    } else {
      inner = `<span class="miss-x">x</span>`;
    }
    return `<div class="dot-slot" style="background:${bg}">${inner}</div>`;
  }).join("");

  return `<div class="song-row" style="background:${rowBg}">
    <div class="song-count" style="color:${numColor}">${showCount ? count : ""}</div>
    <div class="song-name-cell">
      <span class="song-name${isCanonical ? " canonical" : ""}">${escapeHtml(song.abbr)}${
        isCanonical ? '<span class="canonical-star">*</span>' : ""
      }</span>
    </div>
    <div class="days-cell">${daysDisplay}</div>
    <div class="dots-cell">${dots}</div>
  </div>`;
}

function render() {
  const app = document.getElementById("app");
  const gridShows = SHOWS.slice().reverse();

  app.innerHTML =
    renderHeader() +
    renderStats() +
    renderShowButtons() +
    renderSetlist() +
    renderSearch() +
    renderSortRow() +
    renderGridHeader(gridShows) +
    `<div class="song-list">${renderSongListInner(gridShows)}</div>`;

  // Bindings
  app.querySelectorAll(".show-btn").forEach(b => {
    b.addEventListener("click", () => setState({ selectedShow: b.dataset.date }));
  });
  app.querySelectorAll(".sort-btn").forEach(b => {
    b.addEventListener("click", () => setState({ sort: b.dataset.sort }));
  });
  const input = document.getElementById("search-input");
  if (input) {
    input.addEventListener("input", e => {
      // Preserve focus & caret across re-render
      const caret = e.target.selectionStart;
      state.search = e.target.value;
      render();
      const fresh = document.getElementById("search-input");
      fresh.focus();
      try { fresh.setSelectionRange(caret, caret); } catch (_) {}
    });
  }
}

function renderSongListInner(gridShows) {
  let list = SONGS.slice();
  if (state.search) {
    const q = state.search.toLowerCase();
    list = list.filter(s => s.name.toLowerCase().includes(q) || s.abbr.toLowerCase().includes(q));
  }
  if (state.sort === "freq") {
    list.sort(freqSort);
    list = applySegueGrouping(list);
  } else {
    list.sort((a, b) => a.abbr.localeCompare(b.abbr));
  }
  let lastCount = null;
  let html = "";
  list.forEach((song, i) => {
    const count = song.dates.length;
    const showCount = state.sort === "freq" ? count !== lastCount : true;
    const showDivider = state.sort === "freq" && showCount && i > 0;
    if (state.sort === "freq") lastCount = count;
    if (showDivider) html += '<div class="group-divider"></div>';
    html += renderSongRow(song, count, showCount, gridShows);
  });
  return html;
}

render();
